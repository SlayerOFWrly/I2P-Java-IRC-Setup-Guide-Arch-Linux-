<server name="IRC-I2P.local" description="Private IRC on I2P" network="IRC-I2P">
<bind address="127.0.0.1" port="6667" type="clients">


<admin name="admin "
nick="admin"
email="root@localhost">

<connect
allow="127.0.0.1" port="6667"
commandrate="999999999999999"
pingfreq="10m"
timeout="10m"
softsendq="128M"
hardsend="128M"
recvq="128M"
useconnflood="no"
fakelag="no"
modes="+X">

<class name="default"
commands="WALLOPS GLOBOPS"
privs="users/mass-message users/flood/increased-buffers users/flood/no-throttle users/flood/no-fakelag">

<performance
netbuffersize="32096K"
timeskipwarn="5s"
clonesconnect="yes"
quietbursts="yes">
